<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6 - Bookstore Navigation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }
 
        header {
            background-color: #2c3e50;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;  
            align-items: center;
        }
        .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }
 
        nav {
            display: flex;         
            align-items: center;
            gap: 0;                 
        }
        nav a {
            color: white;
            text-decoration: none;  
            padding: 8px 16px;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #3498db;
        }
 
        .bullet {
            color: #7f8c8d;
            font-size: 12px;
        }
 
        .toggle-btn {
            padding: 8px 16px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .toggle-btn:hover {
            background-color: #c0392b;
        }
 
        .hidden {
            display: none !important;  
        }
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .book-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .book-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 200px;
        }
        .book-card h3 { margin-bottom: 8px; color: #2c3e50; }
        .book-card p { color: #666; font-size: 14px; }
        footer {
            text-align: center;
            padding: 20px;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>
 
    <header>
        <span class="logo">BookStore</span>
        <nav id="navMenu">
            <a href="#">Home</a>
            <span class="bullet">&bull;</span>          
            <a href="#">Books &copy;</a>
            <span class="bullet">&bull;</span>
            <a href="#">Authors &trade;</a>
            <span class="bullet">&bull;</span>
            <a href="#">Contact</a>
        </nav>
        <button class="toggle-btn" onclick="toggleMenu()">Toggle Menu</button>
    </header>
 
    <main>
        <h2>Featured Books</h2>
        <div class="book-grid">
            <div class="book-card">
                <h3>The Great Gatsby</h3>
                <p>A story of the mysteriously wealthy Jay Gatsby.</p>
            </div>
            <div class="book-card">
                <h3>To Kill a Mockingbird</h3>
                <p>A novel about racial injustice in the Deep South.</p>
            </div>
            <div class="book-card">
                <h3>1984</h3>
                <p>A dystopian novel about totalitarianism.</p>
            </div>
        </div>
    </main>
 
    <footer>
        <p>&copy; 2024 BookStore &trade;. All rights reserved.</p>
    </footer>
 
<script>
    function toggleMenu() {
        var nav = document.getElementById("navMenu");
        nav.classList.toggle("hidden");
    }
</script>
 
</body>
</html>
